<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body style="font-family:arial;">
    
    <form action="#" method="#">

        <div>
            <label for="fname">First Name: </label>
            <input type="text" id="fname" name="fname" placeholder="First name" required>
        </div>
        
        <br>
        <div>
            <label for="lname">Last Name: </label>
            <input type="text" id="lname" name="lname" placeholder="Last Name" required>
        </div>

        <br>
        <div>
            <label for="pass">Password: </label>
            <input type="password" id="pass" name="pass" placeholder="Password" required>
        </div>
        
        <br>
        <div>
            <label for="email">Email: </label>
            <input type="email" id="email" name="email" placeholder="example@cn.fr" required>
        </div>

        <br>
        <div>
            <label for="phone">Phone: </label>
            <input type="tel" id="phone" name="phone" placeholder="003 004 332 44" required>
        </div>

        <br>
        <div>
            <label for="DOB">DOB: </label>
            <input type="date" id="dob" name="dob" required>
        </div>

        <br>
        <div>
            <label for="quantity">Quantity: </label>
            <input type="number" id="lname" name="lname" placeholder="50" required>
        </div>

        <br>
        <div>
            <label for="title">Title:</label>

            <label for="Mr.">Mr.</label>
            <input type="radio" id="Mr." name="title" value="Mr.">

            <label for="Mrs.">Mrs.</label>
            <input type="radio" id="Mrs." name="title" value="Mrs.">

            <label for="PhD">Dr.</label>
            <input type="radio" id="PhD" name="title" value="PhD">
        </div>

        <br>
        <div>
            <label for="payment">Payment: </label>
            <select name="payment" id="payment">
                <option value="visa">Visa</option>
                <option value="mastercard">Mastercard</option>
                <option value="bitcoin">Bit Coins</option>
            </select>
        </div>

        <br>
        <div>
            <label for="subscribe">Subscribe</label>
            <input type="checkbox" name="subscribe">
        </div>

        <br>
        <div>
            <input type="reset">
        </div>

        <br>
        <div>
            <input type="submit">
        </div>
    </form>
</body>
</html>
