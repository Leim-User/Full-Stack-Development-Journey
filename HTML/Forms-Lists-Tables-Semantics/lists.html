<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <h1>Lists</h1>
    <h2>Shopping List</h2>
    <ul>
        <li>Eggs</li>
        <li>Cucumber</li>
        <li>Tomatoes</li>
        <li>Bread</li>
    </ul>

    <h2>Households</h2>
    <ol>
        <li>Clean Kitchen</li>
        <li>Wash dishes</li>
        <li>Laundry</li>
    </ol>

    <h2>Description List</h2>
    <dl>
        <dt>HTML:</dt> <!--Description Title-->
        <dd>Hyper Text Markup Language</dd> <!--Description Data-->
        <dt>CSS:</dt>
        <dd>Cascading Style Sheet</dd>
    </dl>
</body>
</html>
