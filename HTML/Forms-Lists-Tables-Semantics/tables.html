<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>

    <style>
        table, th, td {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <table>
        <tr> <!--Table Row-->
            <th>Product</th> <!--Table heading-->
            <th>Price</th>
        </tr>
        <tr>
            <td>Phone</td>
            <td>$200</td>
        </tr>
        <tr>
            <td>Tablet</td>
            <td>$6</td>
        </tr>
        <tr>
            <td>Laptop</td>
            <td>$350</td>
        </tr>
    </table>
</body>
</html>
